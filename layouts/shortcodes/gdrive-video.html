{{- $id := .Get "id" -}}
{{- if $id -}}
<div class="video-embed">
  <iframe
    src="https://drive.google.com/file/d/{{ $id }}/preview"
    title="Google Drive video"
    allow="autoplay; encrypted-media; picture-in-picture"
    allowfullscreen
    loading="lazy">
  </iframe>
</div>
{{- else -}}
<p><em>Missing Google Drive video id.</em></p>
{{- end -}}
